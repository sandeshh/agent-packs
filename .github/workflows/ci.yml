name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: cli/go.sum
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install Python test deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r tests/requirements.txt
      - name: Go tests
        run: go test ./...
        working-directory: cli
      - name: Build CLI
        run: go build -o bin/agent-packs ./cmd/agent-packs
        working-directory: cli
      - name: Python schema and integration tests
        run: .venv/bin/python -m unittest discover -s tests
      - name: Validate registry
        run: |
          cli/bin/agent-packs validate registry/schemas/examples
          cli/bin/agent-packs validate registry/packs
          cli/bin/agent-packs validate registry/skills
          cli/bin/agent-packs validate registry/plugins
      - name: Verify registry packs
        run: |
          cli/bin/agent-packs verify frontend-engineer
          cli/bin/agent-packs verify pr-review
          cli/bin/agent-packs verify eng-leader
      - name: Audit registry packs
        continue-on-error: true
        run: |
          cli/bin/agent-packs audit frontend-engineer
          cli/bin/agent-packs audit pr-review
          cli/bin/agent-packs audit eng-leader
      - name: Policy check registry packs
        run: |
          for pack in frontend-engineer pr-review eng-leader; do
            cli/bin/agent-packs policy check "$pack" registry/policy/default.json
          done
      - name: Publish check
        run: cli/bin/agent-packs publish --check
      - name: Check registry index is up to date
        run: |
          cli/bin/agent-packs index --output /tmp/index.json
          .venv/bin/python - <<'PY'
          import json
          from pathlib import Path

          committed = json.loads(Path("registry/index.json").read_text())
          generated = json.loads(Path("/tmp/index.json").read_text())
          committed.pop("generatedAt", None)
          generated.pop("generatedAt", None)
          if committed != generated:
              raise SystemExit("registry/index.json is stale")
          PY
      - name: Generate registry index
        run: cli/bin/agent-packs index --output registry/index.json
      - name: Prepare GitHub Pages site
        run: |
          mkdir -p site/registry
          cp docs/catalog.html site/index.html
          cp registry/index.json site/registry/index.json
      - name: Upload catalog artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
