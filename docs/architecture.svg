<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent Packs high-level architecture</title>
  <desc id="desc">Public sources feed the Agent Packs registry. The Go CLI resolves packs, writes cache state, receipts, and lockfiles, and targets coding agents such as Codex and Claude Code.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .primary { fill: #0f766e; }
      .primaryText { fill: #ffffff; font: 700 24px Arial, sans-serif; }
      .title { fill: #0f172a; font: 700 26px Arial, sans-serif; }
      .label { fill: #334155; font: 600 18px Arial, sans-serif; }
      .small { fill: #475569; font: 15px Arial, sans-serif; }
      .tiny { fill: #64748b; font: 13px Arial, sans-serif; }
      .box { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 10; }
      .store { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .target { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .warn { fill: #fefce8; stroke: #ca8a04; stroke-width: 2; rx: 10; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .dash { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
  </defs>

  <rect class="bg" width="1200" height="720" />
  <text x="60" y="58" class="title">Agent Packs Architecture</text>
  <text x="60" y="84" class="small">Curated capability bundles for AI coding agents, with reference-first installation and explicit sync modes.</text>

  <rect x="50" y="125" width="250" height="430" class="panel" />
  <text x="80" y="165" class="label">Public Sources</text>
  <rect x="80" y="195" width="190" height="62" class="box" />
  <text x="105" y="224" class="small">Agent Skills</text>
  <text x="105" y="244" class="tiny">GitHub repo/path refs</text>
  <rect x="80" y="280" width="190" height="62" class="box" />
  <text x="105" y="309" class="small">Claude Plugins</text>
  <text x="105" y="329" class="tiny">plugin.json manifests</text>
  <rect x="80" y="365" width="190" height="62" class="box" />
  <text x="105" y="394" class="small">MCP / Commands</text>
  <text x="105" y="414" class="tiny">tools, hooks, prompts</text>
  <rect x="80" y="450" width="190" height="62" class="box" />
  <text x="105" y="479" class="small">Remote Registries</text>
  <text x="105" y="499" class="tiny">named git/local sources</text>

  <rect x="380" y="125" width="280" height="430" class="panel" />
  <text x="410" y="165" class="label">Agent Packs Registry</text>
  <rect x="410" y="195" width="220" height="62" class="store" />
  <text x="435" y="224" class="small">registry/packs</text>
  <text x="435" y="244" class="tiny">pack manifests</text>
  <rect x="410" y="280" width="220" height="62" class="store" />
  <text x="435" y="309" class="small">registry/skills</text>
  <text x="435" y="329" class="tiny">reference SKILL.md entries</text>
  <rect x="410" y="365" width="220" height="62" class="store" />
  <text x="435" y="394" class="small">registry/plugins</text>
  <text x="435" y="414" class="tiny">reference plugin dirs</text>
  <rect x="410" y="450" width="220" height="62" class="store" />
  <text x="435" y="479" class="small">schemas/examples</text>
  <text x="435" y="499" class="tiny">validation and docs</text>

  <rect x="735" y="145" width="240" height="120" class="primary" rx="14" />
  <text x="785" y="193" class="primaryText">Go CLI</text>
  <text x="772" y="222" class="primaryText" style="font-size:18px">agent-packs</text>
  <text x="748" y="252" class="small" style="fill:#ccfbf1">search, install, update, verify</text>

  <rect x="720" y="330" width="270" height="185" class="panel" />
  <text x="750" y="370" class="label">State Store</text>
  <rect x="750" y="392" width="210" height="38" class="warn" />
  <text x="775" y="416" class="small">cache / sources</text>
  <rect x="750" y="440" width="210" height="38" class="warn" />
  <text x="775" y="464" class="small">receipts</text>
  <rect x="750" y="488" width="210" height="38" class="warn" />
  <text x="775" y="512" class="small">lockfiles + revisions</text>

  <rect x="1035" y="125" width="120" height="430" class="panel" />
  <text x="1052" y="165" class="label">Targets</text>
  <rect x="1050" y="195" width="90" height="52" class="target" />
  <text x="1069" y="226" class="small">Codex</text>
  <rect x="1050" y="270" width="90" height="52" class="target" />
  <text x="1060" y="301" class="small">Claude</text>
  <rect x="1050" y="345" width="90" height="52" class="target" />
  <text x="1066" y="376" class="small">Cursor</text>
  <rect x="1050" y="420" width="90" height="52" class="target" />
  <text x="1062" y="451" class="small">Generic</text>

  <path class="arrow" d="M300 310 C330 310, 345 310, 380 310" />
  <path class="arrow" d="M660 260 C700 240, 710 220, 735 210" />
  <path class="arrow" d="M855 265 L855 330" />
  <path class="arrow" d="M975 205 C1002 205, 1010 205, 1035 205" />
  <path class="dash" d="M975 425 C1005 425, 1014 425, 1035 425" />

  <text x="675" y="615" class="label">Sync Modes</text>
  <rect x="675" y="635" width="130" height="36" class="box" />
  <text x="701" y="658" class="small">reference</text>
  <rect x="820" y="635" width="110" height="36" class="box" />
  <text x="845" y="658" class="small">symlink</text>
  <rect x="945" y="635" width="90" height="36" class="box" />
  <text x="973" y="658" class="small">copy</text>
  <rect x="1050" y="635" width="100" height="36" class="box" />
  <text x="1074" y="658" class="small">native</text>

  <text x="60" y="638" class="label">Core Flow</text>
  <text x="60" y="665" class="small">Public source references -> registry manifests -> CLI transaction plan -> cache/receipts/locks -> agent targets.</text>
</svg>
